<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>supercoach.ai – Executive Intelligence Platform</title>
  <meta name="description" content="KI-gestützter Sparring-Partner für Unternehmer, Geschäftsführer und Führungskräfte." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a08; font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a08; }
    ::-webkit-scrollbar-thumb { background: #2a2a26; border-radius: 2px; }
    textarea, input[type="text"] { font-family: 'DM Sans', sans-serif; outline: none; }
    input[type="range"] { accent-color: #c9a96e; }
    .card { transition: transform 0.25s ease, border-color 0.25s ease; cursor: pointer; }
    .card:hover { transform: translateY(-4px); border-color: #c9a96e !important; }
    .btn { transition: all 0.18s ease; cursor: pointer; }
    .btn-gold:hover { background: #e8c98a !important; transform: translateY(-1px); }
    .btn-ghost:hover { border-color: #c9a96e !important; color: #c9a96e !important; }
    .msg { animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .dot { animation: pulse 1.4s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,60%,100% { opacity: 0.15; transform: scale(0.8); } 30% { opacity: 1; transform: scale(1); } }
    .bar { transition: width 1.2s cubic-bezier(0.16,1,0.3,1); }
    .suggest:hover { border-color: #c9a96e !important; color: #f0ebe0 !important; }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .score-glow { animation: glow 2s ease infinite alternate; }
    @keyframes glow { from { text-shadow: 0 0 20px rgba(201,169,110,0.3); } to { text-shadow: 0 0 40px rgba(201,169,110,0.6); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; width: 16px; height: 16px; display: inline-block; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const FREE_SESSIONS = 2;
    const C = {
      bg:"#0a0a08", surface:"#1a1a17", surface2:"#222220",
      gold:"#d4ae72", goldLight:"#ecd48e", text:"#f5f2ec",
      muted:"#b0a898", border:"#303028", green:"#5ab87a", red:"#e86060",
    };

    const checkPremiumFromURL = () => {
      const params = new URLSearchParams(window.location.search);
      if (params.get("premium") === "true") {
        window.history.replaceState({}, "", window.location.pathname);
        return true;
      }
      return false;
    };

    const STRAT_QUESTIONS = [
      { cat:"Markt",      key:"m1", q:"Wie klar ist deine Marktposition für deine Kunden?" },
      { cat:"Markt",      key:"m2", q:"Wie gut kennst du die Bedürfnisse deiner Top-10-Kunden wirklich?" },
      { cat:"Team",       key:"t1", q:"Wie stark ist dein Unternehmen ohne dich als treibende Kraft?" },
      { cat:"Team",       key:"t2", q:"Wie klar sind Verantwortlichkeiten und Entscheidungswege verteilt?" },
      { cat:"Finanzen",   key:"f1", q:"Wie sicher ist deine Liquidität für die nächsten 12 Monate?" },
      { cat:"Finanzen",   key:"f2", q:"Wie gut kontrollierst du deine wichtigsten Kostentreiber?" },
      { cat:"Leadership", key:"l1", q:"Wie konsequent delegierst du – ohne anschließend zu kontrollieren?" },
      { cat:"Leadership", key:"l2", q:"Wie sichtbar und konsistent lebst du Unternehmenskultur vor?" },
      { cat:"Strategie",  key:"s1", q:"Wie klar ist dein Ziel für die nächsten 3 Jahre?" },
      { cat:"Strategie",  key:"s2", q:"Wie systematisch arbeitest du AN statt IM Unternehmen?" },
    ];

    const NAV_STEPS = [
      { label:"Die Entscheidung",   key:"decision", placeholder:"Was genau steht zur Entscheidung? Sei präzise.", multi:true },
      { label:"Option A",           key:"optionA",  placeholder:"Erste Option beschreiben...", multi:false },
      { label:"Option B",           key:"optionB",  placeholder:"Zweite Option beschreiben...", multi:false },
      { label:"Wer ist betroffen?", key:"stake",    placeholder:"Team, Kunden, Gesellschafter, Familie...", multi:true },
      { label:"Das größte Risiko",  key:"risks",    placeholder:"Was ist dein realistisches Worst-Case-Szenario?", multi:true },
    ];

    function App() {
      const [screen, setScreen]               = useState("dashboard");
      const [isPremium, setIsPremium]         = useState(false);
      const [aiReplies, setAiReplies]         = useState(0);
      const [showUpgrade, setShowUpgrade]     = useState(false);
      const [checkoutLoading, setCheckoutLoading] = useState(false);
      const [toast, setToast]                 = useState("");
      const [messages, setMessages]           = useState([]);
      const [inputVal, setInputVal]           = useState("");
      const [isThinking, setIsThinking]       = useState(false);
      const chatEndRef                        = useRef(null);
      const [navStep, setNavStep]             = useState(0);
      const [navData, setNavData]             = useState({decision:"",optionA:"",optionB:"",stake:"",risks:""});
      const [navResult, setNavResult]         = useState("");
      const [navLoading, setNavLoading]       = useState(false);
      const [navDone, setNavDone]             = useState(false);
      const [stratStep, setStratStep]         = useState(0);
      const [scores, setScores]               = useState({});
      const [stratResult, setStratResult]     = useState(null);

      useEffect(() => {
        if (checkPremiumFromURL()) {
          setIsPremium(true);
          showToastMsg("★ Willkommen im Premium – dein Zugang ist aktiv.");
        }
      }, []);

      useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages, isThinking]);

      const showToastMsg = (msg) => { setToast(msg); setTimeout(() => setToast(""), 4000); };
      const canSpar = isPremium || aiReplies < FREE_SESSIONS;

      const handleUpgrade = () => {
        window.location.href = "https://buy.stripe.com/bJe8wPdFtezCdzA8Kc3cc00";
      };

      const sendMessage = async () => {
        if (!inputVal.trim() || isThinking) return;
        if (!canSpar) { setShowUpgrade(true); return; }
        const userMsg = { role:"user", content:inputVal.trim() };
        const history = [...messages, userMsg];
        setMessages(history); setInputVal(""); setIsThinking(true);
        try {
          const res = await fetch("/.netlify/functions/anthropic-proxy", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              model:"claude-sonnet-4-20250514", max_tokens:1000,
              system:`Du bist ein erfahrener Unternehmer und Sparring-Partner auf Augenhöhe für Geschäftsführer und KMU-Führungskräfte. Du bist KEIN Coach – du bist ein Peer. Direkter Stil, Advocatus Diaboli. Gegenfragen, blinde Flecken aufdecken. Auf Deutsch. Max 120 Wörter. Nur eine Frage pro Antwort.`,
              messages: history,
            }),
          });
          const data = await res.json();
          const reply = data.content?.[0]?.text || "Keine Antwort.";
          setMessages([...history, { role:"assistant", content:reply }]);
          if (!isPremium) setAiReplies(n => n + 1);
        } catch { setMessages([...history, { role:"assistant", content:"Verbindungsfehler. Bitte erneut versuchen." }]); }
        finally { setIsThinking(false); }
      };

      const generateAnalysis = async () => {
        setNavLoading(true);
        try {
          const res = await fetch("/.netlify/functions/anthropic-proxy", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              model:"claude-sonnet-4-20250514", max_tokens:1000,
              system:"Du bist ein erfahrener Executive Sparring Partner. Direkt, klar, kein Weichspüler. Auf Deutsch.",
              messages:[{ role:"user", content:`Analysiere diese Entscheidung als Sparring-Partner:\n\nEntscheidung: ${navData.decision}\nOption A: ${navData.optionA}\nOption B: ${navData.optionB}\nBetroffene: ${navData.stake}\nGrößtes Risiko: ${navData.risks}\n\nStrukturiere in 3 Abschnitte:\n1. EINSCHÄTZUNG\n2. DIE UNGESTELLTE FRAGE\n3. EMPFEHLUNG` }],
            }),
          });
          const data = await res.json();
          setNavResult(data.content?.[0]?.text || "Fehler.");
        } catch { setNavResult("Verbindungsfehler."); }
        finally { setNavLoading(false); setNavDone(true); }
      };

      const calcResult = () => {
        const catMap = { Markt:["m1","m2"], Team:["t1","t2"], Finanzen:["f1","f2"], Leadership:["l1","l2"], Strategie:["s1","s2"] };
        const cats = Object.keys(catMap).map(cat => ({ cat, score: Math.round((catMap[cat].reduce((s,k) => s+(scores[k]??5),0)/2)*10)/10 }));
        setStratResult({ cats, total: Math.round((cats.reduce((s,r)=>s+r.score,0)/5)*10)/10 });
        setStratStep(10);
      };

      const resetNav = () => { setNavStep(0); setNavData({decision:"",optionA:"",optionB:"",stake:"",risks:""}); setNavResult(""); setNavDone(false); };
      const resetStrat = () => { setStratStep(0); setScores({}); setStratResult(null); };
      const goHome = (fn) => { setScreen("dashboard"); fn&&fn(); };

      const s = (obj) => Object.assign({}, obj);

      // ── DASHBOARD ──
      const Dashboard = () => (
        <div style={{maxWidth:940,margin:"0 auto",padding:"48px 24px"}}>
          <div style={{textAlign:"center",marginBottom:64}}>
            <div style={{fontFamily:"'Cormorant Garamond'",fontSize:12,letterSpacing:5,color:C.gold,textTransform:"uppercase",marginBottom:20}}>Executive Intelligence Platform</div>
            <h1 style={{fontFamily:"'Cormorant Garamond'",fontSize:56,fontWeight:300,lineHeight:1.08,color:C.text,marginBottom:18}}>Kein Coaching.<br /><em>Echter Sparring.</em></h1>
            <p style={{color:C.muted,fontSize:15,lineHeight:1.75,maxWidth:460,margin:"0 auto 36px"}}>Für Unternehmer und Führungskräfte, die jemanden brauchen, der auf Augenhöhe zurückfragt – nicht zuhört.</p>
            {!isPremium ? (
              <div style={{display:"inline-flex",alignItems:"center",gap:10,background:C.surface,border:`1px solid ${C.border}`,borderRadius:100,padding:"8px 20px"}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:aiReplies>=FREE_SESSIONS?C.red:C.green}}/>
                <span style={{fontSize:13,color:C.muted}}>{Math.max(0,FREE_SESSIONS-aiReplies)} von {FREE_SESSIONS} kostenlosen Sparring-Sessions</span>
              </div>
            ):(
              <div style={{display:"inline-flex",alignItems:"center",gap:8,background:"#1a160e",border:"1px solid rgba(201,169,110,0.4)",borderRadius:100,padding:"8px 20px"}}>
                <span style={{color:C.gold}}>★</span><span style={{fontSize:13,color:C.gold}}>Premium aktiv – unbegrenzter Zugang</span>
              </div>
            )}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:20,marginBottom:40}}>
            {[
              {icon:"⚔️",title:"AI Sparring",desc:"Dein Advocatus Diaboli. Stellt die Fragen, die dein Team nicht stellt.",screen:"sparring"},
              {icon:"🧭",title:"Entscheidungs-Navigator",desc:"5 Fragen. Klare Struktur. KI-Analyse deiner schwierigsten Entscheidung.",screen:"navigator"},
              {icon:"📊",title:"Strategie-Check",desc:"10 ehrliche Fragen. Dein aktueller Standort in 5 Dimensionen.",screen:"strategie"},
            ].map(f=>(
              <div key={f.screen} className="card" onClick={()=>setScreen(f.screen)}
                style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:18,padding:30,position:"relative",overflow:"hidden"}}>
                <div style={{fontSize:30,marginBottom:14}}>{f.icon}</div>
                <div style={{fontFamily:"'Cormorant Garamond'",fontSize:24,color:C.text,fontWeight:500,marginBottom:10,lineHeight:1.2}}>{f.title}</div>
                <p style={{fontSize:13,color:C.muted,lineHeight:1.65,marginBottom:18}}>{f.desc}</p>
                <div style={{fontSize:11,color:C.gold,letterSpacing:2,textTransform:"uppercase"}}>Kostenlos testen →</div>
                <div style={{position:"absolute",bottom:-24,right:-24,width:90,height:90,borderRadius:"50%",background:"rgba(201,169,110,0.04)"}}/>
              </div>
            ))}
          </div>
          {!isPremium&&(
            <div style={{background:"linear-gradient(135deg,#17120a 0%,#141412 100%)",border:"1px solid rgba(201,169,110,0.25)",borderRadius:20,padding:"40px 48px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:32}}>
              <div>
                <div style={{fontFamily:"'Cormorant Garamond'",fontSize:30,color:C.text,marginBottom:8}}>Mehr Klarheit. Jeden Tag.</div>
                <p style={{color:C.muted,fontSize:14,lineHeight:1.6,maxWidth:400}}>Premium: Unbegrenzte Sessions, detaillierte Auswertungen, monatliche Leadership-Reports.</p>
              </div>
              <button className="btn btn-gold" onClick={()=>setShowUpgrade(true)}
                style={{background:C.gold,color:"#0a0a08",border:"none",borderRadius:100,padding:"15px 36px",fontSize:14,fontWeight:500,fontFamily:"'DM Sans'",whiteSpace:"nowrap",flexShrink:0}}>
                Jetzt Premium – ab €29/Mo
              </button>
            </div>
          )}
        </div>
      );

      // ── SPARRING ──
      const Sparring = () => (
        <div style={{maxWidth:720,margin:"0 auto",padding:"32px 24px",height:"calc(100vh - 70px)",display:"flex",flexDirection:"column"}}>
          <div style={{marginBottom:24,flexShrink:0}}>
            <button className="btn" onClick={()=>setScreen("dashboard")} style={{background:"none",border:"none",color:C.muted,fontSize:13,fontFamily:"'DM Sans'",marginBottom:16}}>← Zurück</button>
            <div style={{fontFamily:"'Cormorant Garamond'",fontSize:34,color:C.text,fontWeight:300,marginBottom:4}}>AI Sparring Session</div>
            <div style={{fontSize:13,color:C.muted}}>Schildere deine Situation – dein Sparring-Partner antwortet direkt.</div>
          </div>
          <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:14,paddingRight:4}}>
            {messages.length===0&&(
              <div style={{textAlign:"center",padding:"40px 16px"}}>
                <div style={{fontFamily:"'Cormorant Garamond'",fontSize:22,color:C.muted,fontStyle:"italic",marginBottom:28,lineHeight:1.4}}>
                  "Was ist die eine Entscheidung,<br/>die du gerade vor dir herschiebst?"
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,maxWidth:520,margin:"0 auto"}}>
                  {["Mein Unternehmen läuft nicht ohne mich","Ich überlege, ob ich einen Bereich aufgebe","Mein Konkurrent zieht an mir vorbei","Wachstum oder Stabilität – was jetzt?","Mein Preis stimmt nicht mehr","Ich habe einen schwierigen Mitarbeiter"].map(s=>(
                    <div key={s} className="suggest btn" onClick={()=>setInputVal(s)}
                      style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",fontSize:12,color:C.muted,textAlign:"left",transition:"all 0.2s"}}>
                      {s}
                    </div>
                  ))}
                </div>
              </div>
            )}
            {messages.map((m,i)=>(
              <div key={i} className="msg" style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",alignItems:"flex-start",gap:10}}>
                {m.role==="assistant"&&<div style={{width:30,height:30,borderRadius:"50%",background:C.gold,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#0a0a08",fontWeight:700,flexShrink:0,marginTop:2}}>S</div>}
                <div style={{maxWidth:"74%",background:m.role==="user"?C.surface2:C.surface,border:`1px solid ${C.border}`,borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"12px 16px",fontSize:14,color:C.text,lineHeight:1.7,whiteSpace:"pre-wrap"}}>
                  {m.content}
                </div>
              </div>
            ))}
            {isThinking&&(
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:C.gold,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#0a0a08",fontWeight:700}}>S</div>
                <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"16px 16px 16px 4px",padding:"14px 18px",display:"flex",gap:5}}>
                  <div className="dot" style={{width:7,height:7,borderRadius:"50%",background:C.gold}}/>
                  <div className="dot" style={{width:7,height:7,borderRadius:"50%",background:C.gold}}/>
                  <div className="dot" style={{width:7,height:7,borderRadius:"50%",background:C.gold}}/>
                </div>
              </div>
            )}
            <div ref={chatEndRef}/>
          </div>
          {!isPremium&&aiReplies>=FREE_SESSIONS&&(
            <div style={{background:"#1a0f0f",border:"1px solid rgba(224,82,82,0.3)",borderRadius:10,padding:"12px 18px",marginTop:12,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
              <span style={{fontSize:13,color:C.red}}>Kostenlose Sessions aufgebraucht</span>
              <button className="btn btn-gold" onClick={()=>setShowUpgrade(true)} style={{background:C.gold,color:"#0a0a08",border:"none",borderRadius:100,padding:"7px 18px",fontSize:12,fontFamily:"'DM Sans'"}}>Premium freischalten</button>
            </div>
          )}
          <div style={{display:"flex",gap:10,paddingTop:14,borderTop:`1px solid ${C.border}`,flexShrink:0,marginTop:8}}>
            <textarea value={inputVal} onChange={e=>setInputVal(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}}
              placeholder={!canSpar?"Premium für weitere Sessions...":"Deine Situation... (Enter zum Senden)"}
              disabled={!canSpar}
              style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"13px 16px",color:C.text,fontSize:14,resize:"none",height:54,lineHeight:1.4,transition:"border-color 0.2s"}}
              onFocus={e=>e.target.style.borderColor=C.gold} onBlur={e=>e.target.style.borderColor=C.border}
            />
            <button className="btn" onClick={sendMessage} disabled={isThinking||!canSpar}
              style={{background:C.gold,color:"#0a0a08",border:"none",borderRadius:12,width:54,height:54,fontSize:20,flexShrink:0,opacity:isThinking||!canSpar?0.5:1}}>
              →
            </button>
          </div>
        </div>
      );

      // ── NAVIGATOR ──
      const Navigator = () => {
        const step = NAV_STEPS[navStep];
        return (
          <div style={{maxWidth:620,margin:"0 auto",padding:"32px 24px"}}>
            <button className="btn" onClick={()=>goHome(resetNav)} style={{background:"none",border:"none",color:C.muted,fontSize:13,fontFamily:"'DM Sans'",marginBottom:24}}>← Zurück</button>
            <div style={{fontFamily:"'Cormorant Garamond'",fontSize:34,color:C.text,fontWeight:300,marginBottom:4}}>Entscheidungs-Navigator</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:36}}>5 Fragen. KI-Analyse. Klarheit.</div>
            {!navDone&&(<>
              <div style={{display:"flex",gap:6,marginBottom:36}}>
                {NAV_STEPS.map((_,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<navStep?C.gold:i===navStep?C.goldLight:C.border,transition:"background 0.3s"}}/>)}
              </div>
              <div style={{fontSize:11,color:C.gold,letterSpacing:3,textTransform:"uppercase",marginBottom:10}}>Schritt {navStep+1} von 5</div>
              <div style={{fontFamily:"'Cormorant Garamond'",fontSize:28,color:C.text,marginBottom:24,lineHeight:1.3}}>{step.label}</div>
              {step.multi?(
                <textarea autoFocus value={navData[step.key]} onChange={e=>setNavData({...navData,[step.key]:e.target.value})}
                  placeholder={step.placeholder}
                  style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:18,color:C.text,fontSize:14,resize:"none",height:130,lineHeight:1.65,marginBottom:24,transition:"border-color 0.2s"}}
                  onFocus={e=>e.target.style.borderColor=C.gold} onBlur={e=>e.target.style.borderColor=C.border}
                />
              ):(
                <input type="text" autoFocus value={navData[step.key]} onChange={e=>setNavData({...navData,[step.key]:e.target.value})}
                  onKeyDown={e=>e.key==="Enter"&&navData[step.key]&&navStep<4&&setNavStep(s=>s+1)}
                  placeholder={step.placeholder}
                  style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:18,color:C.text,fontSize:14,marginBottom:24,transition:"border-color 0.2s"}}
                  onFocus={e=>e.target.style.borderColor=C.gold} onBlur={e=>e.target.style.borderColor=C.border}
                />
              )}
              <div style={{display:"flex",justifyContent:"space-between"}}>
                {navStep>0?<button className="btn btn-ghost" onClick={()=>setNavStep(s=>s-1)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:100,padding:"10px 26px",color:C.muted,fontSize:13,fontFamily:"'DM Sans'",transition:"all 0.2s"}}>Zurück</button>:<div/>}
                {navStep<4?(
                  <button className="btn btn-gold" onClick={()=>setNavStep(s=>s+1)} disabled={!navData[step.key]}
                    style={{background:C.gold,color:"#0a0a08",border:"none",borderRadius:100,padding:"11px 30px",fontSize:13,fontFamily:"'DM Sans'",fontWeight:500,opacity:navData[step.key]?1:0.4}}>Weiter →</button>
                ):(
                  <button className="btn btn-gold" onClick={generateAnalysis} disabled={navLoading}
                    style={{background:C.gold,color:"#0a0a08",border:"none",borderRadius:100,padding:"11px 30px",fontSize:13,fontFamily:"'DM Sans'",fontWeight:500}}>
                    {navLoading?"Analysiere...":"Analyse starten →"}
                  </button>
                )}
              </div>
            </>)}
            {navDone&&navResult&&(
              <div className="fade-in">
                <div style={{fontFamily:"'Cormorant Garamond'",fontSize:26,color:C.gold,marginBottom:20}}>Deine Entscheidungs-Analyse</div>
                <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:28,fontSize:14,color:C.text,lineHeight:1.8,whiteSpace:"pre-wrap",marginBottom:24}}>{navResult}</div>
                <div style={{display:"flex",gap:12}}>
                  <button className="btn btn-ghost" onClick={resetNav} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:100,padding:"10px 26px",color:C.muted,fontSize:13,fontFamily:"'DM Sans'",transition:"all 0.2s"}}>Neue Entscheidung</button>
                  <button className="btn btn-gold" onClick={()=>setScreen("sparring")} style={{background:C.gold,color:"#0a0a08",border:"none",borderRadius:100,padding:"10px 26px",fontSize:13,fontFamily:"'DM Sans'",fontWeight:500}}>Weiter im Sparring →</button>
                </div>
              </div>
            )}
          </div>
        );
      };

      // ── STRATEGIE ──
      const Strategie = () => {
        const q = STRAT_QUESTIONS[stratStep];
        return (
          <div style={{maxWidth:620,margin:"0 auto",padding:"32px 24px"}}>
            <button className="btn" onClick={()=>goHome(resetStrat)} style={{background:"none",border:"none",color:C.muted,fontSize:13,fontFamily:"'DM Sans'",marginBottom:24}}>← Zurück</button>
            <div style={{fontFamily:"'Cormorant Garamond'",fontSize:34,color:C.text,fontWeight:300,marginBottom:4}}>Strategie-Check</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:36}}>10 ehrliche Fragen. Dein Standort in 5 Dimensionen.</div>
            {stratStep<10&&q&&(<>
              <div style={{display:"flex",gap:5,marginBottom:36}}>
                {STRAT_QUESTIONS.map((_,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<stratStep?C.gold:i===stratStep?C.goldLight:C.border,transition:"background 0.3s"}}/>)}
              </div>
              <div style={{fontSize:11,letterSpacing:3,color:C.gold,textTransform:"uppercase",marginBottom:10}}>{q.cat} · {stratStep+1} / 10</div>
              <div style={{fontFamily:"'Cormorant Garamond'",fontSize:28,color:C.text,marginBottom:40,lineHeight:1.3}}>{q.q}</div>
              <div style={{marginBottom:48}}>
                <input type="range" min={1} max={10} value={scores[q.key]??5}
                  onChange={e=>setScores({...scores,[q.key]:parseInt(e.target.value)})}
                  style={{width:"100%",marginBottom:14}}
                />
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:12,color:C.muted}}>1 – Schwach</span>
                  <div style={{textAlign:"center"}}>
                    <div className="score-glow" style={{fontFamily:"'Cormorant Garamond'",fontSize:48,color:C.gold,lineHeight:1}}>{scores[q.key]??5}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2}}>von 10</div>
                  </div>
                  <span style={{fontSize:12,color:C.muted}}>10 – Stark</span>
                </div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                {stratStep>0?<button className="btn btn-ghost" onClick={()=>setStratStep(s=>s-1)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:100,padding:"10px 26px",color:C.muted,fontSize:13,fontFamily:"'DM Sans'",transition:"all 0.2s"}}>Zurück</button>:<div/>}
                {stratStep<9?(
                  <button className="btn btn-gold" onClick={()=>setStratStep(s=>s+1)} style={{background:C.gold,color:"#0a0a08",border:"none",borderRadius:100,padding:"11px 30px",fontSize:13,fontFamily:"'DM Sans'",fontWeight:500}}>Weiter →</button>
                ):(
                  <button className="btn btn-gold" onClick={calcResult} style={{background:C.gold,color:"#0a0a08",border:"none",borderRadius:100,padding:"11px 30px",fontSize:13,fontFamily:"'DM Sans'",fontWeight:500}}>Auswertung →</button>
                )}
              </div>
            </>)}
            {stratStep===10&&stratResult&&(
              <div className="fade-in">
                <div style={{fontFamily:"'Cormorant Garamond'",fontSize:26,color:C.text,marginBottom:8}}>Dein Ergebnis</div>
                <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:36}}>
                  <div className="score-glow" style={{fontFamily:"'Cormorant Garamond'",fontSize:80,color:C.gold,lineHeight:1}}>{stratResult.total}</div>
                  <div style={{fontFamily:"'Cormorant Garamond'",fontSize:28,color:C.muted}}>/10</div>
                </div>
                {stratResult.cats.map(({cat,score})=>(
                  <div key={cat} style={{marginBottom:22}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                      <span style={{fontSize:13,color:C.text}}>{cat}</span>
                      <span style={{fontSize:13,fontWeight:500,color:score>=7?C.green:score>=5?C.gold:C.red}}>{score}/10</span>
                    </div>
                    <div style={{height:6,background:C.surface2,borderRadius:3,overflow:"hidden"}}>
                      <div className="bar" style={{height:"100%",width:`${score*10}%`,background:score>=7?C.green:score>=5?C.gold:C.red,borderRadius:3}}/>
                    </div>
                  </div>
                ))}
                <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px 22px",margin:"28px 0",fontSize:14,color:C.text,lineHeight:1.65}}>
                  {stratResult.total>=7?"✅ Solide Basis. Fokussiere auf deine schwächste Dimension – dort liegt der größte Hebel."
                    :stratResult.total>=5?"⚠️ Mehrere Bereiche mit Handlungsbedarf. Priorisiere konsequent."
                    :"🔴 Dringender Handlungsbedarf. Ein klarer Plan ist die Voraussetzung für alles weitere."}
                </div>
                {!isPremium&&(
                  <div style={{background:"linear-gradient(135deg,#17120a,#141412)",border:"1px solid rgba(201,169,110,0.3)",borderRadius:14,padding:"22px 24px",textAlign:"center",marginBottom:20}}>
                    <div style={{fontFamily:"'Cormorant Garamond'",fontSize:22,color:C.text,marginBottom:6}}>Premium: Detaillierter Handlungsplan</div>
                    <div style={{fontSize:13,color:C.muted,marginBottom:16}}>Konkrete Maßnahmen je Dimension + monatliche Fortschrittsmessung.</div>
                    <button className="btn btn-gold" onClick={()=>setShowUpgrade(true)}
                      style={{background:C.gold,color:"#0a0a08",border:"none",borderRadius:100,padding:"11px 28px",fontSize:13,fontFamily:"'DM Sans'",fontWeight:500}}>
                      Vollständige Analyse freischalten
                    </button>
                  </div>
                )}
                <button className="btn btn-ghost" onClick={resetStrat}
                  style={{background:"none",border:`1px solid ${C.border}`,borderRadius:100,padding:"10px 24px",color:C.muted,fontSize:13,fontFamily:"'DM Sans'",transition:"all 0.2s"}}>
                  Neu starten
                </button>
              </div>
            )}
          </div>
        );
      };

      // ── UPGRADE MODAL ──
      const UpgradeModal = () => (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:24}}>
          <div style={{background:"#141412",border:"1px solid rgba(201,169,110,0.35)",borderRadius:22,padding:"44px 40px",maxWidth:440,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:11,letterSpacing:5,color:C.gold,textTransform:"uppercase",marginBottom:14}}>Premium</div>
            <div style={{fontFamily:"'Cormorant Garamond'",fontSize:36,color:C.text,lineHeight:1.1,marginBottom:28}}>Voller Zugang.<br/>Kein Limit.</div>
            <div style={{fontFamily:"'Cormorant Garamond'",fontSize:48,color:C.gold,marginBottom:4}}>€29<span style={{fontSize:18,color:C.muted}}>/Monat</span></div>
            <div style={{fontSize:12,color:C.muted,marginBottom:30}}>Monatlich kündbar · Keine Bindung</div>
            <div style={{textAlign:"left",marginBottom:32}}>
              {["Unbegrenzte AI Sparring-Sessions","Entscheidungs-Navigator ohne Limit","Detaillierte Strategie-Auswertung","Monatlicher Leadership-Report","Peer Board Simulator (Coming Soon)"].map(f=>(
                <div key={f} style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                  <span style={{color:C.gold,fontSize:14,flexShrink:0}}>✓</span>
                  <span style={{fontSize:13,color:C.text}}>{f}</span>
                </div>
              ))}
            </div>
            <button className="btn" onClick={handleUpgrade} disabled={checkoutLoading}
              style={{background:checkoutLoading?"#4a4a4a":"#635bff",color:"#fff",border:"none",borderRadius:100,padding:"15px 40px",fontSize:14,fontWeight:500,fontFamily:"'DM Sans'",width:"100%",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:10,cursor:checkoutLoading?"not-allowed":"pointer",transition:"background 0.2s"}}
              onMouseEnter={e=>!checkoutLoading&&(e.currentTarget.style.background="#5469d4")}
              onMouseLeave={e=>!checkoutLoading&&(e.currentTarget.style.background="#635bff")}>
              {checkoutLoading?(<><div className="spinner"/>Weiterleitung zu Stripe...</>):(<>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                  <rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/>
                </svg>
                Jetzt Premium freischalten
              </>)}
            </button>
            <div style={{fontSize:11,color:C.muted,marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              🔒 Sichere Zahlung über Stripe · SSL-verschlüsselt
            </div>
            <button className="btn" onClick={()=>setShowUpgrade(false)} style={{background:"none",border:"none",color:C.muted,fontSize:13,fontFamily:"'DM Sans'"}}>Vielleicht später</button>
          </div>
        </div>
      );

      return (
        <div style={{background:C.bg,color:C.text,minHeight:"100vh",fontFamily:"'DM Sans', sans-serif"}}>
          <div style={{borderBottom:`1px solid ${C.border}`,height:70,padding:"0 28px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"rgba(10,10,8,0.96)",backdropFilter:"blur(12px)",zIndex:50}}>
            <div onClick={()=>setScreen("dashboard")} style={{cursor:"pointer",display:"flex",alignItems:"baseline",gap:2}}>
              <span style={{fontFamily:"'Cormorant Garamond'",fontSize:24,color:C.text,fontWeight:500}}>super</span>
              <span style={{fontFamily:"'Cormorant Garamond'",fontSize:24,color:C.gold,fontWeight:500}}>coach</span>
              <span style={{fontSize:12,color:C.muted,background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:"2px 6px",marginLeft:4}}>.ai</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              {!isPremium?(
                <button className="btn btn-ghost" onClick={()=>setShowUpgrade(true)}
                  style={{background:"none",border:"1px solid rgba(201,169,110,0.4)",color:C.gold,borderRadius:100,padding:"7px 20px",fontSize:12,fontFamily:"'DM Sans'",transition:"all 0.2s"}}>
                  Premium
                </button>
              ):(
                <div style={{fontSize:12,color:C.gold,background:"#1a160e",border:"1px solid rgba(201,169,110,0.3)",borderRadius:100,padding:"6px 16px"}}>★ Premium</div>
              )}
            </div>
          </div>
          <div style={{overflowY:screen==="sparring"?"hidden":"auto",maxHeight:screen==="sparring"?"calc(100vh - 70px)":"auto"}}>
            {screen==="dashboard"&&<Dashboard/>}
            {screen==="sparring"&&<Sparring/>}
            {screen==="navigator"&&<Navigator/>}
            {screen==="strategie"&&<Strategie/>}
          </div>
          {showUpgrade&&<UpgradeModal/>}
          {toast&&(
            <div className="fade-in" style={{position:"fixed",bottom:28,right:28,background:"#1a2a1a",border:`1px solid ${C.green}`,borderRadius:10,padding:"13px 22px",fontSize:13,color:C.green,zIndex:200}}>
              {toast}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
